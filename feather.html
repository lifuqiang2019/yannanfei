<title>归雁 · 羽脉图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#F5F6F7;
  font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
}
#wrap{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 16px;
}
#chart{width:100%;max-width:1480px}
#head{text-align:center;margin-bottom:12px;pointer-events:none}
#head h1{font-size:21px;font-weight:200;letter-spacing:11px;color:#D05D61}
#head p{font-size:9px;letter-spacing:4.5px;color:#A8A8A8;margin-top:5px;text-transform:uppercase}
#legend{display:flex;gap:26px;margin-bottom:10px;pointer-events:none;align-items:center}
.leg{display:flex;align-items:center;gap:7px;font-size:9px;letter-spacing:2px;color:#888888}
.leg-dot{width:7px;height:7px;border-radius:50%}
.leg-sep{color:#CCCCCC;font-size:10px}
svg{display:block;overflow:visible}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:.4}
  50%{transform:scale(2.6);opacity:.05}
}
@keyframes pulse-core{
  0%,100%{transform:scale(1);opacity:.9}
  50%{transform:scale(1.4);opacity:.55}
}
.glow-ring{
  transform-box:fill-box;transform-origin:center;
  filter:blur(9px);opacity:.4
}
.glow-core{
  transform-box:fill-box;transform-origin:center;opacity:.9
}
.hov-on .glow-ring{animation:breathe 2.6s ease-in-out infinite}
.hov-on .glow-core{animation:pulse-core 2.6s ease-in-out infinite}
.h-date{font-size:9.5px;letter-spacing:1.5px}
.h-val{font-size:17px;font-weight:100;letter-spacing:.4px}
.h-rec{font-size:7.5px;letter-spacing:1px}
/* ── Back-to-home button ── */
#home-btn{
  position:fixed;top:22px;left:28px;
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;
  border:1px solid rgba(0,0,0,0.09);
  border-radius:20px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(10px);
  cursor:pointer;
  z-index:50;
  text-decoration:none;
  transition:border-color .3s,background .3s,opacity .3s;
  outline:none;
}
#home-btn:hover{
  border-color:rgba(208,93,97,0.35);
  background:rgba(255,255,255,0.92);
}
#home-btn .arr{font-size:11px;color:#AAAAAA;transition:color .3s,transform .3s}
#home-btn .lbl{font-size:9px;letter-spacing:3.5px;text-indent:3.5px;color:#888888;
  font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  transition:color .3s;}
#home-btn:hover .arr{color:#D05D61;transform:translateX(-2px)}
#home-btn:hover .lbl{color:#D05D61}
/* Page transitions */
body{opacity:0;transition:opacity .5s ease}
body.visible{opacity:1}
body.leaving{opacity:0}

/* ══════════════════════════════════════════
   BEZIER
══════════════════════════════════════════ */
function qbez(t,x0,y0,x1,y1,x2,y2){
  const u=1-t;
  return {x:u*u*x0+2*t*u*x1+t*t*x2, y:u*u*y0+2*t*u*y1+t*t*y2};
}

/* Feather vane envelope — bell-shaped, peaks at t≈0.38
   Makes base short (down near calamus), bulges in middle, tapers at tip */
function envelope(t){ return Math.exp(-Math.pow((t-0.42)/0.42,2)*1.5); }

/* ══════════════════════════════════════════
   DRAW FEATHER (daily barbs)
══════════════════════════════════════════ */
function drawFeather(g, cx, yBase, data, nDays, isSpring, color, spCN, mStart, mLen, mLabel){
  const H  = isSpring ? 390 : 242;
  const ML = isSpring ?  76 :  47;   // max barb half-length at envelope peak
  const RO = isSpring ?  12 :   7;   // rachis bow offset
  const RW = isSpring ? 1.6 : 1.0;
  const BW = isSpring ? 0.50: 0.38;  // base barb stroke
  const GMAX = isSpring ? SMAX : AMAX;

  const ytip = yBase - H;
  const rcx  = cx + RO, rcy = yBase - H*0.5;

  // ── Rachis ──
  g.append('path')
    .attr('d',`M ${cx},${yBase} Q ${rcx},${rcy} ${cx},${ytip}`)
    .attr('stroke','rgba(100,100,100,0.45)')
    .attr('stroke-width',RW).attr('fill','none').attr('stroke-linecap','round');

  // ── Month boundary ticks & labels ──
  mStart.forEach((startIdx,mi)=>{
    const t0 = startIdx / (nDays-1) * 0.98 + 0.01;
    const p  = qbez(t0, cx,yBase, rcx,rcy, cx,ytip);
    if(mi>0){
      g.append('line')
        .attr('x1',p.x-6).attr('y1',p.y).attr('x2',p.x+6).attr('y2',p.y)
        .attr('stroke','rgba(0,0,0,0.14)').attr('stroke-width',0.8);
    }
    // label at month midpoint
    const midIdx = startIdx + Math.floor(mLen[mi]/2);
    const tm = midIdx / (nDays-1) * 0.98 + 0.01;
    const pm = qbez(tm, cx,yBase, rcx,rcy, cx,ytip);
    const lx = isSpring ? pm.x-16 : pm.x+15;
    g.append('text')
      .attr('x',lx).attr('y',pm.y+3)
      .attr('text-anchor','middle').attr('font-size','7.5px')
      .attr('fill','rgba(0,0,0,0.32)').attr('letter-spacing','0.2px')
      .text(mLabel[mi]);
  });

  // ── Barbs ──
  // maxCnt for opacity normalisation (per-feather)
  const maxCnt = Math.max(...data.map(d=>d[0]));

  data.forEach((d,i)=>{
    const cnt=d[0], tot=d[1];
    const t = i / (nDays-1) * 0.98 + 0.01;
    const p = qbez(t, cx,yBase, rcx,rcy, cx,ytip);
    const rx=p.x, ry=p.y;

    // Barb angle: steep at base (t=0), shallower at tip (t=1)
    const betaDeg = 68 - 44*t;
    const beta    = betaDeg * Math.PI / 180;

    // Length: envelope × log-norm × ML; ghost stub if no data
    const env = envelope(t);
    const logN = GMAX>0 ? Math.log(tot+1)/Math.log(GMAX+1) : 0;
    const len  = tot>0 ? Math.max(env*logN*ML, env*ML*0.06) : env*ML*0.03;
    const op   = tot>0 ? 0.32+0.58*((cnt||0)/(maxCnt||1)) : 0.10;

    if(len<0.18||env<0.015) return;

    const dx=len*Math.sin(beta), dy=len*Math.cos(beta);
    const bow=len*0.10;
    const cpLx=rx-dx*0.55, cpLy=ry-dy*0.55-bow;
    const cpRx=rx+dx*0.55, cpRy=ry-dy*0.55-bow;
    const lx=rx-dx, ly=ry-dy;
    const rx2=rx+dx, ry2=ry-dy;
    const sw=BW+op*0.28;

    g.append('path')
      .attr('d',`M ${rx},${ry} Q ${cpLx},${cpLy} ${lx},${ly}`)
      .attr('stroke',color).attr('stroke-width',sw)
      .attr('fill','none').attr('stroke-linecap','round').attr('opacity',op);
    g.append('path')
      .attr('d',`M ${rx},${ry} Q ${cpRx},${cpRy} ${rx2},${ry2}`)
      .attr('stroke',color).attr('stroke-width',sw)
      .attr('fill','none').attr('stroke-linecap','round').attr('opacity',op);

    // Hit area (transparent wide stroke)
    if(i%2===0){  // only register every other barb to keep DOM lean
      const dateStr = isSpring ? SPR_DATES[i] : AUT_DATES[i];
      const hd={sp:spCN,date:dateStr,tot,cnt,color,px:rx,py:ry,isSpr:isSpring};
      g.append('path')
        .attr('d',`M ${rx},${ry} Q ${cpRx},${cpRy} ${rx2},${ry2}`)
        .attr('stroke','transparent').attr('stroke-width',11)
        .attr('fill','none').style('cursor','crosshair')
        .datum(hd)
        .on('mouseover',handleOver).on('mousemove',handleMove).on('mouseout',handleOut);
    }
  });
}
