<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>雁南飞</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  overflow: hidden;
  background: #ffffff;
  color: #572c2c;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}

.page {
  position: relative;
  width: 100vw;
  height: 100vh;
  min-width: 1280px;
  min-height: 720px;
  overflow: hidden;
}

.scene {
  position: absolute;
  inset: 0;
}

.scene img {
  position: absolute;
  left: 0;
  width: 100%;
  object-fit: cover;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}

.hero-image {
  top: 0;
  height: 100vh;
}

.reflection-image {
  top: 75vh;
  height: 45.463vh;
  opacity: 0.14;
}

.label {
  position: absolute;
  z-index: 2;
  white-space: nowrap;
}

.label-top {
  top: 3.3333vh;
  left: 83.8021vw;
  font-family: "EB Garamond", "Times New Roman", serif;
  font-style: italic;
  font-weight: 300;
  font-size: 1.0417vw;
  line-height: 1.441;
  color: #572c2c;
}

.label-bottom-cn {
  left: 2.3438vw;
  top: 92.5926vh;
  font-weight: 300;
  font-size: 0.7292vw;
  line-height: 1.4;
  color: #b29999;
}

.label-bottom-en {
  left: 2.3438vw;
  top: 94.9074vh;
  font-family: "EB Garamond", "Times New Roman", serif;
  font-style: italic;
  font-weight: 300;
  font-size: 0.9375vw;
  line-height: 1.441;
  color: #572c2c;
}

.arrow-link {
  position: absolute;
  right: 5.8333vw;
  top: 51.9444vh;
  width: 1.0938vw;
  min-width: 14px;
  aspect-ratio: 20 / 48;
  z-index: 3;
  color: #8f7f7f;
  transition: transform 0.2s ease, color 0.2s ease;
}

.arrow-link:hover {
  color: #6f5f5f;
  transform: translateX(4px);
}

.arrow-link svg {
  display: block;
  width: 100%;
  height: auto;
}

@media (max-aspect-ratio: 16/9) {
  .page {
    min-width: 0;
  }

  .hero-image,
  .reflection-image {
    width: auto;
    min-width: 100%;
  }
}
</style>
</head>
<body>
  <main class="page">
    <div class="scene" aria-hidden="true">
      <img class="hero-image" src="assets/wild-geese-main-143330.png" alt="">
      <img class="reflection-image" src="assets/wild-geese-reflection-713f61.png" alt="">
    </div>

    <div class="label label-top">Wild geese fly south</div>
    <div class="label label-bottom-cn">2025年雁类迁徙信息可视化</div>
    <div class="label label-bottom-en">Visualization of Wild Goose Migration Information</div>

    <a class="arrow-link" href="page2.html" aria-label="下一页">
      <svg viewBox="0 0 21 49" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0.5 0.5L20.5 24.5L0.5 48.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </main>
</body>
</html>
