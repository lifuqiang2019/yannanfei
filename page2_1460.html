<!DOCTYPE html>

<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f5f6f7;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  -webkit-font-smoothing: antialiased;

body { opacity: 0; transition: opacity .45s ease; }
body.visible { opacity: 1; }
p { margin: 0; }
img { display: block; user-select: none; -webkit-user-drag: none; }
#stage { position: fixed; inset: 0; overflow: hidden; }
#board { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; transform-origin: 0 0; }

}

      height: 28px;
      letter-spacing: 0;
      color: #572c2c;
      font-family: "Padyakke Expanded One", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
      font-size: 20px;
    }

    .group207 {
      position: absolute;

<body>
<div id="stage">
  <div id="board">
<div class="frame">
      <p class="text">2025年雁类迁徙信息可视化</p>
      <p class="visualizationOfWildG">
        Visualization of Wild Goose Migration Information
      </p>
      <div class="autoWrapper">
        <p class="wildGeeseFlySouth">Wild geese fly south</p>
        <div class="group207">
          <div class="ellipse91" ></div>
          <div class="ellipse92" ></div>

          <p class="text5">
            <span class="text3">这</span>
            <span class="text4">
              些案例告诉我们：候鸟保护必须从静态的点位转向动态的廊道管理。只有持续追踪分布变化，识别新兴重要区域，才能在全球变化背景下守护这些空中旅人的生命征途。
              <br />
            </span>
          </p>
        </div>
        <img src=".figma/image/mp3n72j8-2hk08xr.png" class="vector" />
      </div>
    </div>
  </div>
</div>
<script>
'use strict';
const board = document.getElementById('board');
function fitBoard() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const offsetX = (window.innerWidth - 1920 * scale) / 2;
  const offsetY = (window.innerHeight - 1080 * scale) / 2;
  board.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}
window.addEventListener('resize', fitBoard);
fitBoard();
requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.add('visible')));
</script>
</body>
