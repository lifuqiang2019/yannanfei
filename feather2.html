<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日度单位观测数据</title>
  <style>
    :root {
      --bg-top: #f6f3f3;
      --bg-mid: #fafbfc;
      --bg-bottom: #ebeef2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 62%, var(--bg-bottom) 100%);
    }

    main {
      width: min(100vw, calc(100vh * 1920 / 1080));
      aspect-ratio: 1920 / 1080;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 62%, var(--bg-bottom) 100%);
    }

    img {
      position: absolute;
      left: 0;
      width: 100%;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .main-image {
      top: 2.4074%;
      height: 95.0926%;
      object-fit: cover;
      object-position: center top;
    }

    .reflection-image {
      top: 77.5926%;
      height: 45.463%;
      object-fit: cover;
      object-position: center top;
      opacity: 0.14;
    }

    @media (max-width: 767px) {
      main {
        width: min(100vw, calc(100svh * 1920 / 1080));
      }
    }
  </style>
</head>
<body>
  <main aria-label="日度单位观测数据页面">
    <img class="main-image" src="assets/wild-geese-main-143330.png" alt="2025年五类雁种迁徙信息图">
    <img class="reflection-image" src="assets/wild-geese-reflection-713f61.png" alt="" aria-hidden="true">
  </main>
</body>
</html>
