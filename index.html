<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>归雁 · 2025 · 中国五种迁徙雁类</title>
<!-- Preload the quote image so the transition is seamless -->
<link rel="preload" href="image/引文.png" as="image">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #F5F6F7;
  font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── Layer 1: Distorted background ── */
#bg {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  filter: url(#waterFilter);
  display: block;
  cursor: crosshair;
  user-select: none;
  -webkit-user-drag: none;
  will-change: filter;
  z-index: 1;
}

/* ── Layer 2: Ripple canvas ── */
#ripple {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

/* ── Layer 3: Start button (lower-center) ── */
#start-img {
  position: fixed;
  bottom: 12vh;
  left: calc(50% + 16px);
  transform: translateX(-50%);
  height: 44px;
  width: auto;
  cursor: pointer;
  z-index: 10;
  user-select: none;
  -webkit-user-drag: none;
  -webkit-tap-highlight-color: transparent;
  transition: filter 0.32s ease, transform 0.32s ease;
  display: block;
}
#start-img:hover {
  filter: brightness(1.06) drop-shadow(0 4px 16px rgba(208,93,97,0.18));
  transform: translateX(-50%) translateY(-3px);
}
#start-img:active {
  transform: translateX(-50%) translateY(-1px);
  filter: brightness(0.95);
}

/* ── Layer 5: BGM button (top-left) ── */
#bgm-btn {
  position: fixed;
  top: 28px; left: 28px;
  width: 40px; height: 40px;
  border: 1px solid rgba(0,0,0,0.09);
  border-radius: 50%;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  outline: none;
  transition: border-color 0.3s, background 0.3s;
}
#bgm-btn:hover {
  border-color: rgba(208,93,97,0.35);
  background: rgba(255,255,255,0.92);
}
.bgm-icon {
  font-size: 15px;
  color: #9A9A9A;
  transition: color 0.3s;
  line-height: 1;
  display: block;
}
#bgm-btn.playing .bgm-icon {
  color: #D05D61;
  animation: icon-pulse 1.9s ease-in-out infinite;
}
@keyframes icon-pulse {
  0%,100% { transform: scale(1)    rotate(0deg); }
  50%      { transform: scale(1.12) rotate(-6deg); }
}
.s-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(208,93,97,0.22);
  animation: s-expand 2.3s ease-out infinite;
  opacity: 0;
  display: none;
}
#bgm-btn.playing .s-ring { display: block; }
.s-ring:nth-child(1) { width:54px; height:54px; top:-8px;  left:-8px; }
.s-ring:nth-child(2) { width:70px; height:70px; top:-16px; left:-16px; animation-delay:.85s; }
@keyframes s-expand {
  0%   { opacity:.5; transform:scale(.85); }
  100% { opacity:0;  transform:scale(1.15); }
}

/* ── Layer 100: Quote fullscreen overlay ── */
#quote-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  background: #F5F6F7;
  transition: opacity 1.1s ease;
}
#quote-overlay.fade-in  { opacity: 1;  pointer-events: all; }
#quote-overlay.fade-out { opacity: 0;  pointer-events: none; }

#quote-text{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(880px,80vw);
  color:#7B7374;
  font-size:18px;
  line-height: 2;
  letter-spacing:1.4px;
  text-align:left;
}
#quote-text .ch{
  display:inline-block;
  opacity:0;
  filter:blur(10px);
  transform:scale(.4);
  transition:opacity .9s ease, filter .9s ease, transform .9s cubic-bezier(.19,1,.22,1);
  will-change:opacity,filter,transform;
}
#quote-text .ch.in{
  opacity:1;
  filter:blur(0);
  transform:scale(1);
}
#quote-text .lead{
  font-size:42px;
  line-height:1;
  color:#B9A6A4;
  margin-right:4px;
  font-weight:400;
}
#quote-text .gap{
  display:block;
  height:14px;
}

#quote-next{
  display:block;
  margin-top:28px;
  text-align:right;
  font-size:48px;
  line-height:1;
  color:rgba(82,35,36,.32);
  font-weight:100;
  font-family:'Times New Roman',serif;
  cursor:pointer;
  user-select:none;
  opacity:0;
  transition:opacity .8s ease, color .3s ease, transform .3s ease;
}
#quote-overlay.fade-in #quote-next{ opacity:1; }
#quote-next:hover{
  color:rgba(82,35,36,.7);
  transform:translateX(6px);
}

#quote-brand{
  position:absolute;
  top:30px;
  right:44px;
  font-size:18px;
  letter-spacing:2px;
  color:#A2A2A2;
  font-family:'EB Garamond','Times New Roman',serif;
  font-style:italic;
  font-weight:300;
  opacity:0;
  transition:opacity 1s ease .2s;
}
#quote-overlay.fade-in #quote-brand{ opacity:1; }

#quote-tagline{
  position:absolute;
  left:44px;
  bottom:36px;
  color:#A0A0A0;
  opacity:0;
  transition:opacity 1s ease .3s;
}
#quote-overlay.fade-in #quote-tagline{ opacity:1; }
#quote-tagline .zh{
  font-size:12px;
  letter-spacing:2.5px;
  color:#9A9A9A;
}
#quote-tagline .en{
  font-size:18px;
  letter-spacing:1.4px;
  font-family:'EB Garamond','Times New Roman',serif;
  font-style:italic;
  margin-top:6px;
  color:#B9A6A4;
}

/* ── Drag-drop overlay ── */
#drag-overlay {
  position: fixed; inset: 0;
  background: rgba(245,246,247,0.9);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
#drag-overlay.visible { opacity: 1; pointer-events: all; }
#drag-overlay .msg {
  font-size: 16px; letter-spacing: 8px; text-indent: 8px;
  color: #D05D61; font-weight: 300; text-align: center;
}
#drag-overlay .submsg {
  font-size: 9px; letter-spacing: 3px;
  color: #AAAAAA; margin-top: 12px; text-align: center;
}

/* ── Page enter / leave ── */
body { opacity: 0; transition: opacity 0.55s ease; }
body.visible  { opacity: 1; }
body.leaving  { opacity: 0; }
</style>
</head>
<body>

<!-- SVG water filter (same document, no CORS) -->
<svg xmlns="http://www.w3.org/2000/svg"
     style="position:absolute;width:0;height:0;overflow:hidden;pointer-events:none">
  <defs>
    <filter id="waterFilter" x="-6%" y="-6%" width="112%" height="112%"
            color-interpolation-filters="sRGB">
      <feTurbulence
        id="fe-turb"
        type="turbulence"
        baseFrequency="0.003 0.002"
        numOctaves="2"
        seed="7"
        result="noise"
      />
      <feDisplacementMap
        id="fe-disp"
        in="SourceGraphic"
        in2="noise"
        scale="4"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>
  </defs>
</svg>

<!-- Layer 1: Background (distorted) -->
<img id="bg" src="image/Title - Background.png" draggable="false" alt="">

<!-- Layer 2: Ripple canvas -->
<canvas id="ripple"></canvas>

<!-- Layer 3: Start button -->
<img id="start-img" src="image/Title-Button.png" draggable="false" alt="开始旅程">

<!-- Layer 4: BGM -->
<audio id="bgm" loop preload="none">
  <source src="../bgm.ogg" type="audio/ogg">
  <source src="../bgm.mp3" type="audio/mpeg">
  <source src="../bgm.wav" type="audio/wav">
</audio>

<button id="bgm-btn" title="音乐开/关 · BGM">
  <div class="s-ring"></div>
  <div class="s-ring"></div>
  <span class="bgm-icon">♪</span>
</button>

<!-- Quote overlay -->
<div id="quote-overlay">
  <div id="quote-brand">Wild geese fly south</div>
  <div id="quote-text">
    <span class="lead">每</span>年春天，数以百万计的大雁掠过天空111，组成"人"字或"一"字，沿着祖辈留下的路线，飞往北方繁殖地；秋天，它们又携家带口返回温暖的南方。
    <span class="gap"></span>
    这条贯穿山河的迁徙之路已经延续了数千年，却在无时无刻悄然地发生着改变。
    <span id="quote-next">›</span>
  </div>
  <div id="quote-tagline">
    <div class="zh">2025年雁类迁徙信息可视化</div>
    <div class="en">Visualization of Wild Goose Migration Information</div>
  </div>
</div>

<!-- Drag-drop BGM overlay -->
<div id="drag-overlay">
  <div>
    <p class="msg">松开以播放 BGM</p>
    <p class="submsg">支持 mp3 / ogg / wav</p>
  </div>
</div>

<script>
'use strict';

/* ── Refs ── */
const feTurb      = document.getElementById('fe-turb');
const feDisp      = document.getElementById('fe-disp');
const canvas      = document.getElementById('ripple');
const rctx        = canvas.getContext('2d');
const bgEl        = document.getElementById('bg');
const bgmEl       = document.getElementById('bgm');
const bgmBtn      = document.getElementById('bgm-btn');
const bgmIcon     = bgmBtn.querySelector('.bgm-icon');
const dragOvl     = document.getElementById('drag-overlay');
const startImg    = document.getElementById('start-img');
const quoteOvl    = document.getElementById('quote-overlay');

/* ── Canvas resize ── */
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ── Water filter state ── */
const BASE_SCALE = 4;
let dispScale  = BASE_SCALE;
let dispTarget = BASE_SCALE;
let phase      = 0;
let frameCount = 0;

/* ── Ripple rings ── */
class RippleSet {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.born = performance.now();
    const base = Math.min(canvas.width, canvas.height);
    this.rings = [
      { delay:   0, maxR: base * 0.33, dur: 2500, lw: 1.6 },
      { delay: 115, maxR: base * 0.23, dur: 2000, lw: 1.1 },
      { delay: 230, maxR: base * 0.14, dur: 1500, lw: 0.7 },
    ];
    this.alive = true;
  }
  draw(now) {
    const age = now - this.born;
    let anyAlive = false;
    for (const ring of this.rings) {
      const rAge = age - ring.delay;
      if (rAge < 0) { anyAlive = true; continue; }
      const p = rAge / ring.dur;
      if (p >= 1) continue;
      anyAlive = true;
      rctx.beginPath();
      rctx.arc(this.x, this.y, ring.maxR * Math.sqrt(p), 0, Math.PI * 2);
      rctx.strokeStyle = `rgba(186,218,255,${(Math.pow(1 - p, 1.75) * 0.48).toFixed(3)})`;
      rctx.lineWidth   = ring.lw * (1 - p * 0.6);
      rctx.stroke();
    }
    this.alive = anyAlive;
  }
}

const rippleSets = [];

function spawnRipple(x, y, strong) {
  rippleSets.push(new RippleSet(x, y));
  dispTarget = strong ? 16 : 10;
}

/* ── Unified animation loop ── */
(function loop(now) {
  requestAnimationFrame(loop);
  frameCount++;

  /* Canvas: ripple rings */
  rctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = rippleSets.length - 1; i >= 0; i--) {
    rippleSets[i].draw(now);
    if (!rippleSets[i].alive) rippleSets.splice(i, 1);
  }

  /* SVG filter: throttled to ~30 fps */
  if (frameCount % 2 !== 0) return;

  phase += 0.0026; // 0.0013 × 2 to compensate for skipped frames

  const f1 = 0.003  + Math.sin(phase * 0.85) * 0.001
                    + Math.cos(phase * 1.72) * 0.0005;
  const f2 = 0.002  + Math.cos(phase * 0.62) * 0.0008
                    + Math.sin(phase * 1.38) * 0.0004;
  feTurb.setAttribute('baseFrequency', f1.toFixed(5) + ' ' + f2.toFixed(5));

  dispScale  += (dispTarget - dispScale)  * 0.07;
  dispTarget += (BASE_SCALE - dispTarget) * 0.045;
  feDisp.setAttribute('scale', dispScale.toFixed(2));
})();

/* ── Background interaction (water ripple on click) ── */
bgEl.addEventListener('click', e => spawnRipple(e.clientX, e.clientY, true));

let lastMove = 0;
bgEl.addEventListener('mousemove', e => {
  if (e.buttons !== 1) return;
  const t = Date.now();
  if (t - lastMove < 260) return;
  lastMove = t;
  spawnRipple(e.clientX, e.clientY, false);
});

  bgEl.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) spawnRipple(t.clientX, t.clientY, true);
  }, { passive: false });

  /* ── Ambient auto-ripple ── */
  (function scheduleAmbient() {
    setTimeout(() => {
    const x = window.innerWidth  * (0.12 + Math.random() * 0.76);
    const y = window.innerHeight * (0.10 + Math.random() * 0.55);
    rippleSets.push(new RippleSet(x, y));
    dispTarget = Math.max(dispTarget, 8);
    scheduleAmbient();
  }, 4000 + Math.random() * 6000);
})();

/* ── Start button → quote transition ── */
let quoteShown = false;

function splitQuoteText(){
  const root = document.getElementById('quote-text');
  if (root.dataset.split === '1') return;
  root.dataset.split = '1';
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      if (node.parentElement && node.parentElement.closest('.lead, .gap, #quote-next')) {
        return NodeFilter.FILTER_REJECT;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const textNodes = [];
  let n;
  while ((n = walker.nextNode())) textNodes.push(n);
  textNodes.forEach(node => {
    const frag = document.createDocumentFragment();
    for (const ch of node.nodeValue) {
      if (ch === ' ' || ch === '\n' || ch === '\t') {
        frag.appendChild(document.createTextNode(ch));
        continue;
      }
      const span = document.createElement('span');
      span.className = 'ch';
      span.textContent = ch;
      frag.appendChild(span);
    }
    node.parentNode.replaceChild(frag, node);
  });
  const lead = root.querySelector('.lead');
  if (lead) lead.classList.add('ch');
}

function animateQuoteChars(){
  const chs = document.querySelectorAll('#quote-text .ch');
  chs.forEach((el, i) => {
    setTimeout(() => el.classList.add('in'), 80 + i * 55);
  });
}

startImg.addEventListener('click', () => {
  if (quoteShown) return;
  quoteShown = true;

  const r = startImg.getBoundingClientRect();
  spawnRipple(r.left + r.width / 2, r.top + r.height / 2, true);

  splitQuoteText();
  setTimeout(() => {
    quoteOvl.classList.add('fade-in');
    animateQuoteChars();
  }, 500);
});

startImg.addEventListener('mouseenter', () => {
  const r = startImg.getBoundingClientRect();
  spawnRipple(r.left + r.width * 0.72, r.top + r.height / 2, false);
});

/* ── Quote overlay arrow → navigate to next page ── */
document.getElementById('quote-next').addEventListener('click', (e) => {
  e.stopPropagation();
  const mask = document.createElement('div');
  mask.style.cssText = 'position:fixed;inset:0;background:#F5F6F7;z-index:9999;';
  document.body.appendChild(mask);
  requestAnimationFrame(() => { window.location.href = 'page2.html'; });
});

/* ── BGM ── */
let bgmPlaying = false;

function setBgmState(on) {
  bgmPlaying = on;
  bgmIcon.textContent = on ? '♫' : '♪';
  bgmBtn.classList.toggle('playing', on);
}

function tryPlay() {
  bgmEl.play().then(() => setBgmState(true)).catch(() => {});
}

bgmBtn.addEventListener('click', () => {
  bgmPlaying ? (bgmEl.pause(), setBgmState(false)) : tryPlay();
});
bgmEl.addEventListener('ended', () => setBgmState(false));

document.addEventListener('pointerdown', () => {
  if (!bgmPlaying) tryPlay();
}, { once: true });

/* Drag-and-drop audio */
document.addEventListener('dragenter', e => {
  if ([...e.dataTransfer.types].includes('Files')) {
    e.preventDefault();
    dragOvl.classList.add('visible');
  }
});
document.addEventListener('dragover',  e => e.preventDefault());
document.addEventListener('dragleave', e => {
  if (!e.relatedTarget || e.relatedTarget === document.documentElement)
    dragOvl.classList.remove('visible');
});
document.addEventListener('drop', e => {
  e.preventDefault();
  dragOvl.classList.remove('visible');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('audio/')) return;
  bgmEl.src = URL.createObjectURL(file);
  bgmEl.load();
  bgmEl.play().then(() => setBgmState(true)).catch(() => {});
});

/* ── Click drop sound ── */
const dropAudio = new Audio('audio/sd.mp3');
dropAudio.preload = 'auto';
document.addEventListener('click', () => {
  try {
    dropAudio.pause();
    dropAudio.currentTime = 0;
    dropAudio.play().catch(() => {});
  } catch (e) {}
}, true);

/* ── Page enter fade-in ── */
requestAnimationFrame(() => requestAnimationFrame(() => {
  document.body.classList.add('visible');
}));
</script>
</body>
</html>
