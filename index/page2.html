<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>归雁 · 全球候鸟迁徙概况</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#F5F6F7;
  font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
  color:#5A5A5A;-webkit-font-smoothing:antialiased;
}
svg{display:block;overflow:visible}

#stage{
  position:fixed;inset:0;
  overflow:hidden;
}
#board{
  position:absolute;
  width:1920px;
  height:1080px;
  left:0;
  top:0;
  transform-origin:0 0;
  background:#F5F6F7;
  overflow:hidden;
}
#board::before{
  content:'';
  position:absolute;
  inset:-18%;
  z-index:0;
  pointer-events:none;
  /* background:
    radial-gradient(circle at 64% 32%, rgba(185,205,230,.34), transparent 28%),
    radial-gradient(circle at 32% 70%, rgba(216,124,134,.18), transparent 34%),
    linear-gradient(105deg, transparent 28%, rgba(255,255,255,.62) 46%, transparent 64%); */
  opacity:0;
  transform:translateX(-8%) scale(1.04);
}
#board::after{
  content:'';
  position:absolute;
  inset:0;
  z-index:20;
  pointer-events:none;
  background:linear-gradient(90deg,#F5F6F7 0%,rgba(245,246,247,.86) 18%,rgba(245,246,247,0) 48%,rgba(245,246,247,.72) 82%,#F5F6F7 100%);
  opacity:1;
}
#board>*{
  z-index:1;
}

/* corner brand */
#corner-brand{
  position:absolute;top:30px;left:48px;
  font-size:18px;letter-spacing:2px;color:#9A9A9A;
  font-family:'EB Garamond','Times New Roman',serif;font-style:italic;font-weight:300;
}

/* logo column (top-right) */
#logo-col{
  position:absolute;top:28px;right:44px;
  display:flex;align-items:flex-start;gap:16px;
}
#logo-col .meta{
  writing-mode:vertical-rl;
  font-size:13px;letter-spacing:8px;color:#7A7A7A;
  line-height:1.45;margin-top:8px;
}
#logo-col .meta b{font-weight:500;color:#5A5A5A}
#logo-col img{height:190px;width:auto;user-select:none;-webkit-user-drag:none}

/* panel headers */
.ph{
  display:inline-block;
  font-size:14px;letter-spacing:1px;color:#666;font-weight:400;
  position:relative;
  padding:11px 18px 11px 26px;
  margin-bottom:10px;
  border:1px solid rgba(92,122,174,0.68);
  line-height:1;
}
.ph::before{
  content:'';position:absolute;left:17px;top:10px;bottom:10px;width:2px;background:#777;
}

#top-header{
  position:absolute;
  left:78px;
  top:86px;
  right:74px;
  height:56px;
  z-index:6;
  pointer-events:none;
}
#top-header .header-title{
  position:absolute;
  top:0;
  padding:11px 18px 11px 26px;
  border:1px solid rgba(92,122,174,0.68);
  color:#666;
  font-size:14px;
  letter-spacing:1px;
  line-height:1;
  background:rgba(245,246,247,0.72);
}
#top-header .header-title::before{
  content:'';
  position:absolute;
  left:17px;
  top:10px;
  bottom:10px;
  width:2px;
  background:#777;
}
#top-header .left-head{left:0}
#top-header .map-head{left:560px}
#intro{
  position:absolute;top:-8px;left:1032px;right:0;
  display:flex;align-items:center;gap:6px;
  pointer-events:none;
}
#intro .big{
  font-size:42px;color:#8F7F7F;font-weight:300;font-family:'Songti SC','STSong',serif;letter-spacing:1px;
  line-height:1;
}
#intro .txt{
  font-size:13px;letter-spacing:1px;color:#888;line-height:1.4;white-space:nowrap;
}
#intro .txt em{font-style:normal;color:#A93F45;font-weight:500;margin:0 1px;}
#intro .arrow{
  position: absolute;
  left: 500px;
  top: 30px;
  color:#8F7F7F;font-size:40px;font-weight:200;line-height:1;
}

#left-module{
  position:absolute;
  left: 78px;
  top: 126px;
  width:560px;
  height:860px;
  overflow:hidden;
  pointer-events:none;
  transform:scale(.9);
  transform-origin:left top;
}
.left-title{
  display:none;
}
.left-title::before{
  display:none;
}
#left-module img{
  position:absolute;
  left:0;
  top:-120px;
  width:1865px;
  height:1080px;
  object-fit:none;
  object-position:left top;
  display:block;
}

/* Center: 世界迁徙图谱 */
#panel-c{
  position:absolute;left:500px;top:154px;right:390px;bottom:140px;
}
#center-map-wrap{
  position:absolute;
  width: 100%;
  height: 100%;
  top: 0px;
  left: 0px;
  display:flex;align-items:center;justify-content:center;
}
#center-map-wrap .layer{
  position:absolute;
  width:100%;height:100%;object-fit:contain;
  user-select:none;-webkit-user-drag:none;
  pointer-events:none;
  opacity:0;
}
#center-map{
  left: -60px;
}
#route-layer-wrap{
  position:absolute;
  inset:0;
  left:40px;
  opacity:0;
  pointer-events:none;
}
#route-layer-wrap .route-layer{
  height: 100%;
  position:absolute;
  object-fit:contain;
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:none;
  opacity:1;
  transition:opacity .32s ease,filter .32s ease;
}
#route-layer-wrap .route-layer[data-route="xitaipingyang"]{
  height: 95%;
  left: 520px;
  top: 40px;
}
#route-layer-wrap .route-layer[data-route="dongya"]{
  height: 97%;
  left: 386px;
  top: 40px;
}
#route-layer-wrap .route-layer[data-route="zhongya"]{
  height: 60%;
  left: 220px;
  top: 40px;
}
#route-layer-wrap .route-layer[data-route="xiya"]{
  height: 84%;
  left: 10px;
  top: 40px;
}
#route-layer-wrap .route-layer.is-hidden{
  opacity:0;
  filter:blur(6px);
}
/* Right: 各通道水鸟陆鸟种数 */
#panel-r{
  position:absolute;right:42px;top:334px;width:315px;height:500px;
}
#panel-r .ph{
  display:inline-block;
  padding:11px 18px 11px 26px;
  margin:0 0 52px 0;
  border:1px solid rgba(92,122,174,0.68);
  font-size:14px;
  letter-spacing:1px;
  color:#666;
  line-height:1;
  background:rgba(245,246,247,0.72);
}
#panel-r .ph::before{
  content:'';
  position:absolute;
  left:17px;
  top:10px;
  bottom:10px;
  width:2px;
  background:#777;
}
#legend-r{
  position:absolute;
  top:82px;
  right:30px;
  display:flex;gap:16px;font-size:12px;letter-spacing:1px;color:#8C8C8C;
  align-items:center;
}
.legend-block{
  display:inline-block;width:14px;height:10px;border-radius:3px;
  background:linear-gradient(180deg,#6E6E6E 0%,rgba(110,110,110,0.1) 100%);
  vertical-align:-3px;margin-right:4px;
}
.legend-block.light{
  background:linear-gradient(180deg,#AFAFAF 0%,rgba(175,175,175,0.1) 100%);
}

/* Bottom-left small bubbles legend (千 百 十) */
#scale-bubbles{
  position:absolute;
  left:58px;
  bottom:36px;
  z-index:3;
  display:flex;
  align-items:flex-end;
  gap:38px;
  padding:0 0 0 0;
  width:250px;
  height:148px;
  font-size:18px;
  letter-spacing:4px;
  color:#9A8A8A;
}
#scale-bubbles .ph{
  position:absolute;
  left:0;
  top:0;
  padding:0;
  border:0;
  margin:0;
  font-size:18px;
  letter-spacing:1px;
  color:#8F7F7F;
  background:transparent;
}
#scale-bubbles .ph::before{display:none}
#scale-bubbles .cell{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
  padding-top:42px;
}
#scale-bubbles .dot{
  border-radius:50%;
  background:linear-gradient(to bottom,#DFE8F3,transparent 100%);
  opacity:.95;
}

/* Bottom corridor legend */
#corridor-legend{
  position:absolute;left:690px;bottom:52px;
  display:grid;grid-template-columns:auto auto;gap:8px 34px;font-size:11px;letter-spacing:1px;color:#666;
  align-items:center;
}
#corridor-legend .item{display:flex;align-items:center;gap:6px;font-size: 14px;cursor:pointer;user-select:none;transition:opacity .25s ease;}
#corridor-legend .item.is-hidden{opacity:.35;}
#corridor-legend .swatch{
  width:16px;height:16px;border-radius:10px;border:1px dashed transparent;
}

/* Bottom right tagline */
#tagline{
  position:absolute;right:44px;bottom:28px;text-align:right;
}
#tagline .zh{font-size:10px;letter-spacing:2.5px;color:#9A9A9A}
#tagline .en{font-size:9.5px;letter-spacing:1.5px;color:#B0B0B0;
  font-family:'EB Garamond','Times New Roman',serif;font-style:italic;margin-top:3px;}

/* time axis at bottom of center */
#center-bottom-mark{
  position:absolute;left:-495px;bottom:-4px;
  font-size:9px;color:#9A9A9A;letter-spacing:4px;
}

/* page enter / leave */
body{opacity:0;transition:opacity .6s ease}
body.visible{opacity:1}
body.leaving{opacity:0}

#corner-brand,
#logo-col,
#top-header .header-title,
#intro,
#left-module,
#panel-c,
#panel-r,
#scale-bubbles,
#corridor-legend,
#tagline{
  opacity:0;
}
body.visible #board::before{
  animation:atmosIn 2.4s cubic-bezier(.19,1,.22,1) .05s both;
}
body.visible #board::after{
  animation:veilOut 1.65s cubic-bezier(.19,1,.22,1) .08s both;
}
body.visible #corner-brand{
  animation:softRise .9s cubic-bezier(.19,1,.22,1) 0s both;
}
body.visible #logo-col{
  animation:softDrop 1s cubic-bezier(.19,1,.22,1) 0s both;
}
body.visible #top-header .map-head{
  animation:lineReveal .9s cubic-bezier(.19,1,.22,1) .7s both;
}
body.visible #panel-c{
  animation:centerMapIn 1.45s cubic-bezier(.19,1,.22,1) .8s both;
}
body.visible #center-map{
  animation:mapBaseIn 1.5s cubic-bezier(.19,1,.22,1) .85s both;
}
body.visible #route-layer-wrap{
  animation:routeIn 1.7s cubic-bezier(.19,1,.22,1) 1.1s both;
}
body.visible #top-header .left-head{
  animation:lineReveal .9s cubic-bezier(.19,1,.22,1) 1.9s both;
}
body.visible #left-module{
  animation:leftAtlasIn 1.6s cubic-bezier(.19,1,.22,1) 2s both;
}
body.visible #scale-bubbles{
  animation:bubblesIn 1.1s cubic-bezier(.19,1,.22,1) 2s both;
}
body.visible #corridor-legend{
  animation:softRise 1s cubic-bezier(.19,1,.22,1) 2s both;
}
body.visible #panel-r{
  animation:panelRightIn 1.05s cubic-bezier(.19,1,.22,1) 2.5s both;
}
body.visible #intro{
  animation:textFloat 1s cubic-bezier(.19,1,.22,1) 3.2s both;
}
body.visible #tagline{
  animation:softRise 1s cubic-bezier(.19,1,.22,1) 3.4s both;
}
#svg-r line,
#svg-r text{
  opacity:0;
}
body.visible #svg-r line,
body.visible #svg-r text{
  animation:chartMarkIn .8s ease-out 2.7s both;
}
#svg-r .bar-r{
  transform:scaleY(0);
  transform-box:fill-box;
  cursor:pointer;
  transition:stroke .28s ease,stroke-width .28s ease,opacity .28s ease;
}
#svg-r .bar-r.top{
  transform-origin:center bottom;
}
#svg-r .bar-r.bottom{
  transform-origin:center top;
}
#svg-r .bar-r:hover{
  opacity:.96!important;
  stroke:rgba(255,255,255,.86);
  stroke-width:1.4;
  filter:drop-shadow(0 4px 8px rgba(92,122,174,.28)) brightness(1.12)!important;
}
body.visible #svg-r .bar-r{
  animation:barGrow .95s cubic-bezier(.2,.9,.22,1) both;
}
body.visible #scale-bubbles .dot{
  animation:bubblePulse 1.6s cubic-bezier(.19,1,.22,1) 2.1s both;
}

@keyframes atmosIn{
  0%{opacity:0;transform:translateX(-8%) scale(1.04)}
  45%{opacity:.78}
  100%{opacity:.42;transform:translateX(0) scale(1)}
}
@keyframes veilOut{
  0%{opacity:1;transform:translateX(0)}
  100%{opacity:0;transform:translateX(22%)}
}
@keyframes softRise{
  0%{opacity:0;transform:translateY(18px);filter:blur(8px)}
  100%{opacity:1;transform:translateY(0);filter:blur(0)}
}
@keyframes softDrop{
  0%{opacity:0;transform:translateY(-18px);filter:blur(8px)}
  100%{opacity:1;transform:translateY(0);filter:blur(0)}
}
@keyframes lineReveal{
  0%{opacity:0;clip-path:inset(0 100% 0 0);transform:translateX(-12px);filter:blur(5px)}
  100%{opacity:1;clip-path:inset(0 0 0 0);transform:translateX(0);filter:blur(0)}
}
@keyframes textFloat{
  0%{opacity:0;transform:translateX(22px);filter:blur(8px)}
  100%{opacity:1;transform:translateX(0);filter:blur(0)}
}
@keyframes leftAtlasIn{
  0%{opacity:0;transform:translateX(-30px) scale(.88);filter:blur(10px);clip-path:inset(0 20% 0 0)}
  100%{opacity:1;transform:translateX(0) scale(.9);filter:blur(0);clip-path:inset(0 0 0 0)}
}
@keyframes leftAtlasReveal{
  0%{opacity:1;transform:scale(.9);clip-path:inset(0 0 100% 0)}
  100%{opacity:1;transform:scale(.9);clip-path:inset(0 0 0 0)}
}
@keyframes centerMapIn{
  0%{opacity:0;transform:translateY(20px) scale(.985);filter:blur(12px)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
@keyframes mapBaseIn{
  0%{opacity:0;transform:scale(1.025);filter:blur(8px) saturate(.85)}
  100%{opacity:1;transform:scale(1);filter:blur(0) saturate(1)}
}
@keyframes routeIn{
  0%{opacity:0;transform:scale(1.018);filter:blur(9px) brightness(1.16)}
  55%{opacity:.78;filter:blur(2px) brightness(1.08)}
  100%{opacity:1;transform:scale(1);filter:blur(0) brightness(1)}
}
@keyframes panelRightIn{
  0%{opacity:0;transform:translateX(24px);filter:blur(9px)}
  100%{opacity:1;transform:translateX(0);filter:blur(0)}
}
@keyframes bubblesIn{
  0%{opacity:0;transform:translateY(22px);filter:blur(8px)}
  100%{opacity:1;transform:translateY(0);filter:blur(0)}
}
@keyframes chartMarkIn{
  0%{opacity:0;filter:blur(4px)}
  100%{opacity:1;filter:blur(0)}
}
@keyframes barGrow{
  0%{opacity:0;transform:scaleY(0);filter:blur(2px)}
  100%{opacity:1;transform:scaleY(1);filter:blur(0)}
}
@keyframes bubblePulse{
  0%{transform:scale(.72);filter:blur(5px)}
  70%{transform:scale(1.08)}
  100%{transform:scale(1);filter:blur(0)}
}

/* hover info text shared style */
.bar-val{font-size:8.5px;fill:#7A7A7A;letter-spacing:.5px}
.axis-text{font-size:9px;fill:#9A9A9A;letter-spacing:1px}
.axis-line{stroke:rgba(0,0,0,0.08);stroke-width:0.6}
</style>
</head>
<body>

<div id="stage">
<div id="board">

  <div id="corner-brand">Wild geese fly south</div>

  <div id="logo-col">

<script src="lib/d3.v7.min.js"></script>
<script>
'use strict';

/* ──────────────────────────────────────────
   Color palette
─────────────────────────────────────────── */
const C_RED  = '#B85460';
const C_RED2 = '#D08894';
const C_BLUE = '#5C7AAE';
const C_BLUE2= '#92A8C8';
const C_GREY = '#9A9A9A';

/* ──────────────────────────────────────────
   PANEL TL — 迁徙时段与种数
   Months along arc (top→bottom), two curves:
     - red curve (south-bound, autumn)  Aug→Dec
     - blue curve (north-bound, spring) Feb→May
   Bubble = species count (鸟种数)
─────────────────────────────────────────── */
(function drawTL(){
  const svg = d3.select('#svg-tl');
  const W=300,H=300;
  const cx=210, cy=150, R=160;

  // months 1..12 placed on arc from -85° (Jan, top) to +85° (Dec, bottom)
  const months = d3.range(1,13);
  const angle = m => (-Math.PI/2) + (m-1)/11 * (Math.PI*0.94) - Math.PI*0.06;

  // axis arc
  const arcPts = d3.range(0,101).map(i=>{
    const a = angle(1 + i/100*11);
    return [cx+Math.cos(a)*R, cy+Math.sin(a)*R];
  });
  svg.append('path').attr('d',d3.line()(arcPts))
    .attr('stroke','rgba(0,0,0,0.10)').attr('stroke-width',0.6).attr('fill','none').attr('stroke-dasharray','2 3');

  // tick months & labels
  months.forEach(m=>{
    const a=angle(m);
    const x=cx+Math.cos(a)*R, y=cy+Math.sin(a)*R;
    svg.append('circle').attr('cx',x).attr('cy',y).attr('r',1.7)
      .attr('fill','rgba(0,0,0,0.25)');
    svg.append('text').attr('x',x+10).attr('y',y+3)
      .attr('font-size','9').attr('fill','#888').attr('letter-spacing','1px')
      .text(m+'月');
  });

  // top axis: 鸟种数 (万种) — small ticks 200,400,600
  svg.append('text').attr('x',26).attr('y',26).attr('font-size','9').attr('fill','#888').attr('letter-spacing','1.5px').text('鸟种数（万种）');
  [600,400,200].forEach((v,i)=>{
    svg.append('text').attr('x',60+i*38).attr('y',46).attr('font-size','8.5').attr('fill','#A9A9A9').attr('text-anchor','middle').text(v);
  });

  // Red south-bound curve points (autumn migration ~ Aug→Dec)
  const redData = [
    {m:8,  v: 80},
    {m:9,  v:160},
    {m:10, v:320},
    {m:11, v:560},
    {m:12, v:280}
  ];
  // Blue north-bound curve (spring ~ Feb→May)
  const blueData = [
    {m:2, v:120},
    {m:3, v:220},
    {m:4, v:420},
    {m:5, v:300}
  ];

  // radial offset r(value)  -> inner radius from center
  const rScale = d3.scaleLinear().domain([0,700]).range([R-12, 70]);

  function curvePoints(arr){
    return arr.map(d=>{
      const a=angle(d.m);
      const r=rScale(d.v);
      return [cx+Math.cos(a)*r, cy+Math.sin(a)*r, d];
    });
  }

  function drawCurve(arr,col){
    const pts=curvePoints(arr);
    const line=d3.line().curve(d3.curveCatmullRom.alpha(0.7))(pts.map(p=>[p[0],p[1]]));
    svg.append('path').attr('d',line).attr('stroke',col).attr('stroke-width',1.4).attr('fill','none').attr('opacity',0.85);
    pts.forEach(p=>{
      const d=p[2];
      const rad = 3 + Math.sqrt(d.v)/2.2;
      svg.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',rad)
        .attr('fill',col).attr('opacity',0.32);
      svg.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',2.2)
        .attr('fill',col);
    });
  }

  drawCurve(redData,  C_RED);
  drawCurve(blueData, C_BLUE);
})();

/* ──────────────────────────────────────────
   PANEL R — 各通道水鸟、陆鸟种数 (万种)
   Two-direction bar chart (top: 越冬, bottom: 繁殖)
   Four corridor groups (4 columns)
─────────────────────────────────────────── */
(function drawR(){
  const svg=d3.select('#svg-r');
  const W=360, H=460;
  const ymid=230;
  const axisX=326;
  const topY=32;
  const botY=432;
  const ys=d3.scaleLinear().domain([0,400]).range([0,200]);
  const defs=svg.append('defs');
  const corridors = [
    {wt:210, lt:360, wb:220, lb:310, color:'#C9626D'},
    {wt:135, lt:305, wb:112, lb:260, color:'#6FA2D8'},
    {wt:82,  lt:190, wb:65,  lb:150, color:'#E9949B'},
    {wt:105, lt:145, wb:78,  lb:112, color:'#A29BD6'},
  ];

  corridors.forEach((c,i)=>{
    [['w',0.92],['l',0.34]].forEach(([kind,op])=>{
      const idT=`rTop${i}${kind}`;
      const idB=`rBot${i}${kind}`;
      defs.append('linearGradient').attr('id',idT).attr('x1','0%').attr('y1','0%').attr('x2','0%').attr('y2','100%')
        .selectAll('stop').data([
          {o:'0%',c:c.color,a:op},
          {o:'100%',c:c.color,a:0.08}
        ]).enter().append('stop').attr('offset',d=>d.o).attr('stop-color',d=>d.c).attr('stop-opacity',d=>d.a);
      defs.append('linearGradient').attr('id',idB).attr('x1','0%').attr('y1','0%').attr('x2','0%').attr('y2','100%')
        .selectAll('stop').data([
          {o:'0%',c:c.color,a:0.08},
          {o:'100%',c:c.color,a:op}
        ]).enter().append('stop').attr('offset',d=>d.o).attr('stop-color',d=>d.c).attr('stop-opacity',d=>d.a);
    });
  });

  svg.append('line').attr('x1',axisX).attr('y1',topY).attr('x2',axisX).attr('y2',ymid-23)
    .attr('stroke','#D8DFEA').attr('stroke-width',1);
  svg.append('line').attr('x1',axisX).attr('y1',ymid+23).attr('x2',axisX).attr('y2',botY)
    .attr('stroke','#D8DFEA').attr('stroke-width',1);

  d3.range(50,401,50).forEach(v=>{
    svg.append('text').attr('x',axisX+11).attr('y',ymid-ys(v)+4)
      .attr('font-size','13').attr('fill','#8D8D8D').text(v);

  d3.range(50,351,50).forEach(v=>{
    svg.append('text').attr('x',axisX+11).attr('y',ymid+ys(v)+4)
      .attr('font-size','13').attr('fill','#8D8D8D').text(v);
  });

  svg.append('text').attr('x',28).attr('y',48).attr('transform','rotate(-35,28,48)')
    .attr('font-size','16').attr('fill','#8D8D8D').attr('letter-spacing','2px').text('春迁');
  svg.append('text').attr('x',28).attr('y',420).attr('transform','rotate(-35,28,420)')
    .attr('font-size','16').attr('fill','#8D8D8D').attr('letter-spacing','2px').text('秋迁');

  corridors.forEach((c,i)=>{
    const gx=52+i*72;
    const bw=20;
    const gap=7;
    const wt=ys(c.wt), lt=ys(c.lt), wb=ys(c.wb), lb=ys(c.lb);
    svg.append('rect').attr('x',gx).attr('y',ymid-wt).attr('width',bw).attr('height',wt)
      .attr('fill',`url(#rTop${i}w)`).attr('rx',4).attr('class','bar-r top')

    svg.append('rect').attr('x',gx+bw+gap).attr('y',ymid-lt).attr('width',bw).attr('height',lt)
      .attr('fill',`url(#rTop${i}l)`).attr('rx',4).attr('class','bar-r top')
      .style('animation-delay',`${2.66+i*.08}s`);
    svg.append('rect').attr('x',gx).attr('y',ymid+23).attr('width',bw).attr('height',wb)
      .attr('fill',`url(#rBot${i}w)`).attr('rx',4).attr('class','bar-r bottom')
      .style('animation-delay',`${2.72+i*.08}s`);
    svg.append('rect').attr('x',gx+bw+gap).attr('y',ymid+23).attr('width',bw).attr('height',lb)
      .attr('fill',`url(#rBot${i}l)`).attr('rx',4).attr('class','bar-r bottom')

document.querySelectorAll('#corridor-legend .item').forEach(item=>{
  item.addEventListener('click',()=>{
    const route=item.dataset.route;
    const layer=document.querySelector(`#route-layer-wrap .route-layer[data-route="${route}"]`);
    if(!layer) return;
    item.classList.toggle('is-hidden');
    layer.classList.toggle('is-hidden');
  });
});

}
