<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日度单位观测数据</title>
  <style>
    :root {
      --bg-top: #f6f3f3;
      --bg-mid: #fafbfc;
      --bg-bottom: #ebeef2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 62%, var(--bg-bottom) 100%);
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    body.visible {
      opacity: 1;
    }

    body.leaving {
      opacity: 0;
    }

    main {
      width: min(100vw, calc(100vh * 1920 / 1080));
      aspect-ratio: 1920 / 1080;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 62%, var(--bg-bottom) 100%);
    }

    img {
      position: absolute;
      left: 0;
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .main-image,
    .reflection-image {
      pointer-events: none;
    }

    .feather-layer {
      position: absolute;
      left: 0;
      top: 2.4074%;
      width: 100%;
      height: 95.0926%;
      z-index: 3;
    }

    #feather-chart {
      position: absolute;
      left: 7.0251%;
      top: 21.0565%;
      width: 85.9498%;
      height: 63.6376%;
    }

    #feather-chart svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      pointer-events: auto;
    }

    @keyframes breathe {
      0%,
      100% {
        transform: scale(1);
        opacity: .4;
      }

      50% {
        transform: scale(2.6);
        opacity: .05;
      }
    }

    @keyframes pulse-core {
      0%,
      100% {
        transform: scale(1);
        opacity: .9;
      }

      50% {
        transform: scale(1.4);
        opacity: .55;
      }
    }

    .glow-ring {
      transform-box: fill-box;
      transform-origin: center;
      filter: blur(9px);
      opacity: .4;
    }

    .glow-core {
      transform-box: fill-box;
      transform-origin: center;
      opacity: .9;
    }

    .hov-on .glow-ring {
      animation: breathe 2.6s ease-in-out infinite;
    }

    .hov-on .glow-core {
      animation: pulse-core 2.6s ease-in-out infinite;
    }

    .h-date {
      font-size: 9.5px;
      letter-spacing: 1.5px;
    }

    .h-val {
      font-size: 17px;
      font-weight: 100;
      letter-spacing: .4px;
    }

    .h-rec {
      font-size: 7.5px;
      letter-spacing: 1px;
    }

    .main-image {
      top: 2.4074%;
      height: 95.0926%;
      object-fit: cover;
      object-position: center top;
    }

    .reflection-image {
      top: 77.5926%;
      height: 45.463%;
      object-fit: cover;
      object-position: center top;
      opacity: 0.14;
    }

    #ripple {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .next-arrow {
      position: absolute;
      top: 50%;
      right: 2.9%;
      transform: translateY(-50%);
      width: 52px;
      height: 96px;
      border: 0;
      padding: 0;
      background: transparent;
      color: rgba(82, 35, 36, 0.34);
      font-family: "Times New Roman", serif;
      font-size: 88px;
      font-weight: 100;
      line-height: 0.78;
      cursor: pointer;
      z-index: 4;
      transition: color 0.3s ease, transform 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .next-arrow:hover,
    .next-arrow:focus-visible {
      color: rgba(82, 35, 36, 0.72);
      transform: translateY(-50%) translateX(6px);
      outline: none;
    }

    .next-arrow:active {
      transform: translateY(-50%) translateX(3px);
    }

    @media (max-width: 767px) {
      main {
        width: min(100vw, calc(100svh * 1920 / 1080));
      }

      .next-arrow {
        right: 2%;
        width: 36px;
        height: 72px;
        font-size: 64px;
      }
    }
  </style>
</head>

    const AUT_LABEL=['七月','八月','九月','十月','十一月','十二月'];
    const SPR_DATES=(()=>{
      const a=[];

      const days=[31,28,31,30,31,30];
      months.forEach((m,mi)=>{for(let d=1;d<=days[mi];d++) a.push(m+'月'+d+'日');});

    const AUT_DATES=(()=>{

      const days=[31,31,30,31,30,31];
      months.forEach((m,mi)=>{for(let d=1;d<=days[mi];d++) a.push(m+'月'+d+'日');});
      return a;
    })();

    function qbez(t,x0,y0,x1,y1,x2,y2){
      const u=1-t;
      return {x:u*u*x0+2*t*u*x1+t*t*x2, y:u*u*y0+2*t*u*y1+t*t*y2};
    }

    function envelope(t){ return Math.exp(-Math.pow((t-0.42)/0.42,2)*1.5); }

    function drawFeather(g, cx, yBase, data, nDays, isSpring, color, spCN, mStart, mLen, mLabel){
      const H=isSpring ? 390 : 242;
      const ML=isSpring ? 76 : 47;
      const RO=isSpring ? 12 : 7;
      const RW=isSpring ? 1.6 : 1.0;
      const BW=isSpring ? 0.50 : 0.38;
      const GMAX=isSpring ? SMAX : AMAX;

      const ytip=yBase - H;
      const rcx=cx + RO, rcy=yBase - H*0.5;

      g.append('path')
        .attr('d',`M ${cx},${yBase} Q ${rcx},${rcy} ${cx},${ytip}`)
        .attr('stroke','rgba(100,100,100,0.45)')
        .attr('stroke-width',RW).attr('fill','none').attr('stroke-linecap','round');

      mStart.forEach((startIdx,mi)=>{
        const t0=startIdx / (nDays-1) * 0.98 + 0.01;
        const p=qbez(t0, cx,yBase, rcx,rcy, cx,ytip);
        if(mi>0){
          g.append('line')
            .attr('x1',p.x-6).attr('y1',p.y).attr('x2',p.x+6).attr('y2',p.y)
            .attr('stroke','rgba(0,0,0,0.14)').attr('stroke-width',0.8);
        }
        const midIdx=startIdx + Math.floor(mLen[mi]/2);
        const tm=midIdx / (nDays-1) * 0.98 + 0.01;
        const pm=qbez(tm, cx,yBase, rcx,rcy, cx,ytip);
        const lx=isSpring ? pm.x-16 : pm.x+15;
        g.append('text')
          .attr('x',lx).attr('y',pm.y+3)
          .attr('text-anchor','middle').attr('font-size','7.5px')
          .attr('fill','rgba(0,0,0,0.32)').attr('letter-spacing','0.2px')
          .text(mLabel[mi]);
      });

      const maxCnt=Math.max(...data.map(d=>d[0]));

      data.forEach((d,i)=>{
        const cnt=d[0], tot=d[1];
        const t=i / (nDays-1) * 0.98 + 0.01;
        const p=qbez(t, cx,yBase, rcx,rcy, cx,ytip);
        const rx=p.x, ry=p.y;
        const betaDeg=68 - 44*t;
        const beta=betaDeg * Math.PI / 180;
        const env=envelope(t);
        const logN=GMAX>0 ? Math.log(tot+1)/Math.log(GMAX+1) : 0;
        const len=tot>0 ? Math.max(env*logN*ML, env*ML*0.06) : env*ML*0.03;
        const op=tot>0 ? 0.32+0.58*((cnt||0)/(maxCnt||1)) : 0.10;

        if(len<0.18 || env<0.015) return;

        const dx=len*Math.sin(beta), dy=len*Math.cos(beta);
        const bow=len*0.10;
        const cpLx=rx-dx*0.55, cpLy=ry-dy*0.55-bow;
        const cpRx=rx+dx*0.55, cpRy=ry-dy*0.55-bow;
        const lx=rx-dx, ly=ry-dy;
        const rx2=rx+dx, ry2=ry-dy;
        const sw=BW+op*0.28;

        g.append('path')
          .attr('d',`M ${rx},${ry} Q ${cpLx},${cpLy} ${lx},${ly}`)
          .attr('stroke',color).attr('stroke-width',sw)
          .attr('fill','none').attr('stroke-linecap','round').attr('opacity',op);
        g.append('path')
          .attr('d',`M ${rx},${ry} Q ${cpRx},${cpRy} ${rx2},${ry2}`)
          .attr('stroke',color).attr('stroke-width',sw)
          .attr('fill','none').attr('stroke-linecap','round').attr('opacity',op);

        if(i%2===0){
          const dateStr=isSpring ? SPR_DATES[i] : AUT_DATES[i];
          const hd={sp:spCN,date:dateStr,tot,cnt,color,px:rx,py:ry,isSpr:isSpring};
          g.append('path')
            .attr('d',`M ${rx},${ry} Q ${cpRx},${cpRy} ${rx2},${ry2}`)
            .attr('stroke','transparent').attr('stroke-width',11)
            .attr('fill','none').style('cursor','crosshair')
            .datum(hd)
            .on('mouseover',handleOver).on('mousemove',handleMove).on('mouseout',handleOut);
        }
      });
    }

    let hovG,glowRing,glowCore,hDate,hVal,hRec;

    function handleOver(ev,d){
      const col=d.color;
      glowRing.attr('fill',col);
      glowCore.attr('fill',col);
      hovG.attr('transform',`translate(${d.px},${d.py})`);
      const isL=d.isSpr;
      const tx=isL ? -76 : 76, anchor=isL ? 'end' : 'start';
      hDate.attr('text-anchor',anchor).attr('x',tx).attr('y',-22).attr('fill',col).text(d.date);
      hVal.attr('text-anchor',anchor).attr('x',tx).attr('y',-2).attr('fill',col)
        .text(d.tot>0 ? d.tot.toLocaleString()+' 只' : '—');
      hRec.attr('text-anchor',anchor).attr('x',tx).attr('y',13)
        .attr('fill','rgba(0,0,0,0.38)').text(d.cnt+' 条记录');
      hovG.classed('hov-on',true).style('opacity','1');

    function handleMove(){}

    const VW=1440, VH=570, YBASE=486;

    (function(){
      'use strict';
      if (typeof d3 === 'undefined') return;

        sg.selectAll('*')

      glowRing=hovG.append('circle').attr('class','glow-ring').attr('r',22);

      const htg=hovG.append('g');

  <script>
    'use strict';

    const mainEl = document.querySelector('main');
    const canvas = document.getElementById('ripple');
    const nextArrow = document.getElementById('next-arrow');
    const ctx = canvas.getContext('2d');
    const rippleSets = [];

    class RippleSet {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.born = performance.now();
        const base = Math.min(mainEl.clientWidth, mainEl.clientHeight);
        this.rings = [
          { delay: 0, maxR: base * 0.11, dur: 1500, lw: 1.5 },
          { delay: 110, maxR: base * 0.08, dur: 1280, lw: 1.1 },
          { delay: 220, maxR: base * 0.05, dur: 1040, lw: 0.8 }
        ];
        this.alive = true;
      }

      draw(now) {
        const age = now - this.born;
        let anyAlive = false;

        for (const ring of this.rings) {
          const ringAge = age - ring.delay;
          if (ringAge < 0) {
            anyAlive = true;
            continue;
          }

          const progress = ringAge / ring.dur;
          if (progress >= 1) continue;

          anyAlive = true;
          ctx.beginPath();
          ctx.arc(this.x, this.y, ring.maxR * Math.sqrt(progress), 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(186, 218, 255, ${(Math.pow(1 - progress, 1.75) * 0.5).toFixed(3)})`;
          ctx.lineWidth = ring.lw * (1 - progress * 0.55);
          ctx.stroke();
        }

        this.alive = anyAlive;
      }
    }

    function resizeCanvas() {
      const rect = mainEl.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function spawnRipple(x, y) {
      rippleSets.push(new RippleSet(x, y));
    }

    function spawnArrowRipple() {
      const mainRect = mainEl.getBoundingClientRect();
      const arrowRect = nextArrow.getBoundingClientRect();
      spawnRipple(
        arrowRect.left - mainRect.left + arrowRect.width / 2,
        arrowRect.top - mainRect.top + arrowRect.height / 2
      );
    }

    function loop(now) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = rippleSets.length - 1; i >= 0; i -= 1) {
        rippleSets[i].draw(now);
        if (!rippleSets[i].alive) rippleSets.splice(i, 1);
      }

      requestAnimationFrame(loop);
    }

    let hoverCooldown = 0;
    function handleArrowHover() {
      const now = performance.now();
      if (now - hoverCooldown < 240) return;
      hoverCooldown = now;
      spawnArrowRipple();
    }

    nextArrow.addEventListener('mouseenter', handleArrowHover);
    nextArrow.addEventListener('focus', handleArrowHover);

    nextArrow.addEventListener('click', () => {
      spawnArrowRipple();
      document.body.classList.add('leaving');
      window.setTimeout(() => {
        window.location.href = 'page2_3.html';
      }, 320);
    });

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    requestAnimationFrame(loop);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.body.classList.add('visible');
    }));
  </script>
