<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>结语1</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f5f6f7;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  -webkit-font-smoothing: antialiased;
}
body { opacity: 0; transition: opacity .45s ease; }
body.visible { opacity: 1; }
p { margin: 0; }
img { display: block; user-select: none; -webkit-user-drag: none; }
#stage { position: fixed; inset: 0; overflow: hidden; }
#board { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; transform-origin: 0 0; }
#board::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 25% 65%, rgba(226, 157, 170, 0.18), transparent 28%), radial-gradient(circle at 72% 26%, rgba(117, 151, 208, 0.18), transparent 30%); pointer-events: none; }
* {
  box-sizing: border-box;
}

.frame {
  display: flex;
  position: relative;
  flex-direction: column;
  align-items: flex-start;
  background: #f5f6f7;
  padding: 1000px 864px 0px 45px;
  width: 1920px;
  height: 1080px;
  overflow: hidden;

  .text {
    width: 230px;
    height: 25px;
    letter-spacing: 0;
    color: #b29999;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
    font-size: 14px;
    font-weight: 300;
  }

  .visualizationOfWildG {
    width: 1011px;
    height: 59px;
    letter-spacing: 0;
    color: #572c2c;
    font-family: "EB Garamond", "Times New Roman", serif;
    font-size: 18px;
    font-style: italic;
    font-weight: 300;
  }

  .autoWrapper {
    position: absolute;
    top: 36px;
    left: 267px;
    width: 1881px;
    height: 1065px;

    .wildGeeseFlySouth {
      position: absolute;
      top: 0;
      left: 1342px;
      width: 539px;
      height: 28px;
      letter-spacing: 0;
      color: #572c2c;
      font-family: "EB Garamond", "Times New Roman", serif;
      font-size: 20px;
      font-style: italic;
      font-weight: 300;
    }

    .group207 {
      display: flex;
      position: absolute;
      top: 5px;
      left: 0;
      align-items: flex-start;
      justify-content: space-between;
      width: 1386px;
      height: 1060px;

      .ellipse91 {
        opacity: 0.2;
        margin-top: 367px;
        border-radius: 50%;
        background: #d05d61;
        width: 693px;
        height: 693px;
        filter: blur(200px);
      }

      .ellipse92 {
        opacity: 0.2;
        border-radius: 50%;
        background: #2a588f;
        width: 693px;
        height: 693px;
        filter: blur(200px);
      }

      .group244 {
        position: absolute;
        top: 454px;
        left: 472px;
        width: 442px;
        height: 90px;

        .text4 {
          position: absolute;
          top: 0;
          left: 0;
          width: 442px;
          height: 90px;
          letter-spacing: 0;
          color: #8f7f7f;
          font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
          font-size: 0;

          .ch {
            display: inline-block;
            opacity: 0;
            filter: blur(10px);
            transform: scale(0.4);
            transition: opacity .9s ease, filter .9s ease, transform .9s cubic-bezier(.19, 1, .22, 1);
            will-change: opacity, filter, transform;
          }

          .ch.in {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
          }

          .text2 {
            line-height: 40px;
            letter-spacing: 0;
            color: #8f7f7f;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 40px;
          }

          .text3 {
            line-height: 24px;
            letter-spacing: 0;
            color: #8f7f7f;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 16px;
          }
        }

        .vector {
          position: absolute;
          top: 66px;
          left: 414px;
          width: 28px;
          height: 28px;
          display: flex;
          align-items: center;
          justify-content: flex-end;
          color: rgba(82, 35, 36, .32);
          font-size: 48px;
          line-height: 1;
          font-weight: 100;
          font-family: "Times New Roman", serif;
          cursor: pointer;
          user-select: none;
          transition: color .3s ease, transform .3s ease;
        }

        .vector:hover {
          color: rgba(82, 35, 36, .7);
          transform: translateX(6px);
        }
      }
    }
  }
}

</style>
</head>
<body>
<div id="stage">
  <div id="board">
<div class="frame">
      <p class="text">2025年雁类迁徙信息可视化</p>
      <p class="visualizationOfWildG">
        Visualization of Wild Goose Migration Information
      </p>
      <div class="autoWrapper">
        <p class="wildGeeseFlySouth">Wild geese fly south</p>
        <div class="group207">
          <div class="ellipse91" ></div>
          <div class="ellipse92" ></div>
          <div class="group244">
            <p class="text4">
              <span class="text2">雁</span>
              <span class="text3">
                类并非盲从千年不变的固定路线。它们根据气候、食物、安全等因素实时调整停歇地和越冬地。
                <br />
                <br />
              </span>
            </p>
            <span class="vector" id="next-page" role="button" aria-label="下一页">›</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
'use strict';
const board = document.getElementById('board');
const textBlock = document.querySelector('.text4');
const nextPage = document.getElementById('next-page');
function fitBoard() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const offsetX = (window.innerWidth - 1920 * scale) / 2;
  const offsetY = (window.innerHeight - 1080 * scale) / 2;
  board.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}
function splitTextChars() {
  if (!textBlock || textBlock.dataset.split === '1') return;
  textBlock.dataset.split = '1';
  const walker = document.createTreeWalker(textBlock, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let node;
  while ((node = walker.nextNode())) textNodes.push(node);
  textNodes.forEach(textNode => {
    const frag = document.createDocumentFragment();
    for (const ch of textNode.nodeValue) {
      if (ch === ' ' || ch === '\n' || ch === '\t') {
        frag.appendChild(document.createTextNode(ch));
        continue;
      }
      const span = document.createElement('span');
      span.className = 'ch';
      span.textContent = ch;
      frag.appendChild(span);
    }
    textNode.parentNode.replaceChild(frag, textNode);
  });
}
function animateTextChars() {
  if (!textBlock) return;
  const chars = textBlock.querySelectorAll('.ch');
  chars.forEach((el, index) => {
    setTimeout(() => el.classList.add('in'), 120 + index * 55);
  });
}
window.addEventListener('resize', fitBoard);
fitBoard();
splitTextChars();
nextPage.addEventListener('click', () => {
  const mask = document.createElement('div');
  mask.style.cssText = 'position:fixed;inset:0;background:#F5F6F7;z-index:9999;';
  document.body.appendChild(mask);
  requestAnimationFrame(() => { window.location.href = 'page2_7.html'; });
});
requestAnimationFrame(() => requestAnimationFrame(() => {
  document.body.classList.add('visible');
  animateTextChars();
}));
</script>
</body>
</html>
